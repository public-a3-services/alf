<header class="site-header">
  <div class="wrapper">
    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
        {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" 
            alt="Logo" 
            style="height: 48px; width: 48px; vertical-align: middle; margin-right: 10px;">
        {% endif %}
        {{ site.title }}
    </a>
  </div>
</header>
